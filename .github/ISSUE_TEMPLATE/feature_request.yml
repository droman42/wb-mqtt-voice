name: Feature request
description: Suggest an enhancement or a new capability.
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area / component
      options:
        - ASR (speech-to-text)
        - TTS (text-to-speech)
        - Wake word / voice trigger
        - VAD (voice activity detection)
        - NLU / intents
        - LLM
        - Audio input/output
        - Web API / WebSocket
        - Build / dependencies / Docker
        - Configuration (TOML)
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
