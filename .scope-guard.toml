# scope-guard config for locveil-voice (BUILD-30; vendored scripts/scope_guard.py at scope-v7.1 per BUILD-42).
# Normative convention: ../locveil-commons/process/ledger-discipline.md (HK-1 / PROD-13).
# Behavior changes happen in locveil-commons, never here — re-pin to move.

[ledger]
active = "docs/RELEASE_PLAN.md"
done = "docs/RELEASE_PLAN_DONE.md"
archive_dir = "docs/archive/ledger"      # created by the first DONE rotation
prefixes = ["ARCH", "QUAL", "TEST", "UI", "DOC", "BUILD", "ASSET", "REL", "BUG", "I18N"]
open_statuses = [" ", "~"]
require_sections = true
sections_required_for_all = false        # voice allows task rows outside (PFX) sections
# REL-1 sign-off rule; voice also marks deferral via the (P-deferred) priority
required_tags = ["[release]", "[deferred]", "(P-deferred)"]
high_water = 3000
low_water = 2000
hard_ceiling = 4000
docs_verdict_since = "2026-07-12"        # completions dated from here need a docs: verdict (process/user-docs.md §3)
contracts_verdict_since = "2026-07-18"   # HK-12/BUILD-42: completions from the sweep date need a contracts: verdict (ledger-discipline.md §7; earlier entries frozen)

[evidence]
dirs = ["docs/review", "docs/design"]
index = true                             # the ledger's `[x]` exists-marker index
link_scan = false
unindexed = "warn"
unreferenced = "warn"                     # scope-v6 (HK-10): a doc on disk no ledger entry references

[journal]
active = "docs/RELEASE_JOURNAL.md"
archive_dir = "docs/archive/journal"
high_water = 1500
low_water = 1000
hard_ceiling = 2000
completion_crosscheck = false            # predates the journal — would flag history
archive_pointer = true

